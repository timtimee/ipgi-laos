<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPGI – Events & Jackpot</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#ffd700;
  --gold-dim:#c9a227;
  --gold-pale:rgba(255,215,0,0.12);
  --crimson:#8b0000;
  --crimson-deep:#1a0000;
  --glass:rgba(10,0,0,0.55);
  --glass-border:rgba(255,215,0,0.25);
  --text:#fff5e6;
  --radius:18px;
  --nav-h:68px;
}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

body{
  font-family:'Raleway',sans-serif;
  color:var(--text);
  background:#0e0000;
  overflow-x:hidden;
  min-height:100vh;
}

/* ── ANIMATED BACKGROUND ── */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(139,0,0,0.7) 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(100,0,0,0.4) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 20% 80%, rgba(80,0,0,0.3) 0%, transparent 60%),
    #080000;
  z-index:0;
  pointer-events:none;
}

/* noise grain overlay */
body::after{
  content:'';
  position:fixed;
  inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size:200px 200px;
  opacity:0.35;
  z-index:0;
  pointer-events:none;
}

/* ══════════════════════════════════════
   NAVBAR
══════════════════════════════════════ */
.navbar{
  position:fixed;
  top:0;left:0;width:100%;height:var(--nav-h);
  padding:0 5%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:rgba(8,0,0,0.85);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--glass-border);
  z-index:1000;
}

.navbar::after{
  content:'';
  position:absolute;
  bottom:-1px;left:15%;right:15%;
  height:1px;
  background:linear-gradient(to right,transparent,var(--gold),transparent);
  opacity:0.6;
}

.logo img{
  height:44px;
  max-width:150px;
  object-fit:contain;
  filter:drop-shadow(0 0 8px rgba(255,215,0,0.3));
  transition:filter .3s;
}
.logo img:hover{filter:drop-shadow(0 0 14px rgba(255,215,0,0.6));}

.lang-switch{display:flex;gap:6px;align-items:center;}
.lang-switch button{
  border:1px solid rgba(255,215,0,0.3);
  background:transparent;
  color:var(--gold);
  border-radius:50%;
  width:38px;height:38px;
  font-size:15px;
  cursor:pointer;
  transition:all .25s;
  display:flex;align-items:center;justify-content:center;
}
.lang-switch button:hover{
  border-color:var(--gold);
  background:rgba(255,215,0,0.1);
  transform:scale(1.08);
}
.lang-switch button.active{
  background:var(--gold);
  border-color:var(--gold);
  color:#5a0000;
  font-weight:700;
  box-shadow:0 0 14px rgba(255,215,0,0.45);
  transform:scale(1.12);
}

/* ══════════════════════════════════════
   HERO / EVENTS
══════════════════════════════════════ */
.hero{
  position:relative;
  z-index:2;
  padding:calc(var(--nav-h) + 60px) 6% 80px;
  text-align:center;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.hero-bg{
  position:absolute;
  inset:0;
  background:url("images/cny-bg.webp") center/cover no-repeat;
  z-index:-1;
}
.hero-bg::after{
  content:'';
  position:absolute;
  inset:0;
  background:
    linear-gradient(to bottom, rgba(8,0,0,0.55) 0%, rgba(8,0,0,0.30) 40%, rgba(8,0,0,0.80) 100%),
    linear-gradient(to right, rgba(8,0,0,0.3) 0%, transparent 30%, transparent 70%, rgba(8,0,0,0.3) 100%);
}

/* Event nav */
.event-nav{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:16px;
  margin-bottom:32px;
}
.event-nav button{
  width:46px;height:46px;
  border-radius:50%;
  border:1px solid rgba(255,215,0,0.4);
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(8px);
  color:var(--gold);
  font-size:22px;
  line-height:1;
  cursor:pointer;
  transition:all .25s;
  display:flex;align-items:center;justify-content:center;
}
.event-nav button:hover{
  background:rgba(255,215,0,0.15);
  border-color:var(--gold);
  transform:scale(1.1);
  box-shadow:0 0 20px rgba(255,215,0,0.2);
}

.evt-dots{display:flex;align-items:center;gap:10px;}
.evt-dot{
  width:9px;height:9px;
  border-radius:50%;
  border:1px solid rgba(255,215,0,0.5);
  background:transparent;
  cursor:pointer;
  transition:all .3s;
  padding:0;
}
.evt-dot.active{
  background:var(--gold);
  box-shadow:0 0 10px rgba(255,215,0,0.6);
  transform:scale(1.3);
}

.hero-content{
  transition:opacity .55s ease, transform .55s ease, filter .55s ease;
  width:100%;
  max-width:860px;
}
.hero-content.fade{opacity:0;transform:translateY(18px) scale(0.985);filter:blur(5px);}

.event-overline{
  font-size:0.65rem;
  font-weight:700;
  letter-spacing:5px;
  text-transform:uppercase;
  color:rgba(255,215,0,0.6);
  margin-bottom:14px;
}

.hero h1{
  font-family:'Cinzel',serif;
  font-size:clamp(2rem, 6vw, 4.5rem);
  font-weight:900;
  letter-spacing:2px;
  color:#fff;
  text-shadow:
    0 0 30px rgba(255,215,0,0.5),
    0 2px 40px rgba(0,0,0,0.8);
  margin-bottom:10px;
  line-height:1.15;
}

.hero h2{
  font-size:clamp(0.85rem, 2vw, 1.1rem);
  font-weight:400;
  color:rgba(255,245,230,0.65);
  letter-spacing:2px;
  margin-bottom:22px;
}

.event-pill{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:linear-gradient(135deg,rgba(255,215,0,0.15),rgba(255,215,0,0.06));
  border:1px solid rgba(255,215,0,0.4);
  backdrop-filter:blur(6px);
  color:var(--gold);
  padding:9px 22px;
  border-radius:100px;
  font-size:0.82rem;
  font-weight:600;
  letter-spacing:1px;
  margin-bottom:30px;
  box-shadow:0 0 20px rgba(255,215,0,0.08),inset 0 1px 0 rgba(255,255,255,0.07);
}

.event-box{
  background:rgba(5,0,0,0.6);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border:1px solid var(--glass-border);
  border-radius:var(--radius);
  padding:0;
  overflow:hidden;
  box-shadow:
    0 0 60px rgba(255,215,0,0.07),
    0 30px 80px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.04);
  position:relative;
}

.event-box::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:2px;
  background:linear-gradient(to right,transparent,var(--gold),transparent);
  opacity:0.7;
  z-index:1;
}

.event-media{display:none;position:relative;}
.event-media.has-img{display:block;}
.event-img{
  width:100%;max-height:320px;
  object-fit:cover;display:block;
  filter:brightness(0.9) contrast(1.05) saturate(1.1);
}
.event-media::after{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 50%,rgba(5,0,0,0.7));
  pointer-events:none;
}

.event-body{padding:32px 36px 36px;}

.prize,.schedule,.event-location,.cta-text{
  margin-bottom:14px;
  font-size:0.93rem;
  line-height:1.7;
  color:rgba(255,245,230,0.85);
}
.prize{color:var(--gold);font-size:1.05rem;}
.schedule{color:rgba(255,245,230,0.72);font-size:0.88rem;}
.cta-text{
  margin-top:18px;padding:16px 20px;
  border-radius:12px;
  background:rgba(255,215,0,0.06);
  border:1px solid rgba(255,215,0,0.18);
  font-size:0.88rem;
  color:rgba(255,245,230,0.78);
}


.event-box{
  transition:transform .55s ease, box-shadow .55s ease;
}
.event-img{
  transition:transform 1.2s ease, filter .55s ease;
}
.hero-content:not(.fade) .event-img{
  animation:eventImageFloat 7s ease-in-out infinite alternate;
}
@keyframes eventImageFloat{
  from{transform:scale(1);}
  to{transform:scale(1.035);}
}

/* ══════════════════════════════════════
   DIVIDER
══════════════════════════════════════ */
.divider{
  position:relative;z-index:2;
  height:1px;
  background:linear-gradient(to right,transparent,rgba(255,215,0,0.4),transparent);
}

/* ══════════════════════════════════════
   JACKPOT SECTION
══════════════════════════════════════ */
.jackpot-section{
  position:relative;z-index:2;
  padding:80px 6% 100px;
  text-align:center;
}

.section-eyebrow{
  font-size:0.65rem;font-weight:700;
  letter-spacing:6px;text-transform:uppercase;
  color:rgba(255,215,0,0.5);margin-bottom:12px;
}

.section-title{
  font-family:'Cinzel',serif;
  font-size:clamp(1.4rem,4vw,2.4rem);
  font-weight:600;
  color:var(--gold);margin-bottom:8px;
  text-shadow:0 0 30px rgba(255,215,0,0.25);
}

.section-subtitle{
  font-size:0.78rem;
  color:rgba(255,245,230,0.35);
  letter-spacing:2px;margin-bottom:40px;
}

.toggle-buttons{
  display:inline-flex;gap:0;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--glass-border);
  border-radius:100px;
  padding:4px;margin-bottom:50px;
}
.toggle-buttons button{
  padding:10px 28px;border-radius:100px;border:none;
  background:transparent;
  color:rgba(255,215,0,0.55);
  font-family:'Raleway',sans-serif;
  font-size:0.82rem;font-weight:600;letter-spacing:1px;
  cursor:pointer;transition:all .3s;
}
.toggle-buttons button.active{
  background:var(--gold);color:#5a0000;
  box-shadow:0 0 20px rgba(255,215,0,0.3);
}
.toggle-buttons button:not(.active):hover{
  color:var(--gold);background:rgba(255,215,0,0.08);
}

#jackpot-container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:24px;max-width:1000px;margin:0 auto;
}

.game{
  background:rgba(5,0,0,0.55);
  backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);
  border-radius:var(--radius);
  padding:32px 28px;
  position:relative;overflow:hidden;
  transition:transform .35s ease, box-shadow .35s ease, opacity .5s ease;
  opacity:0;transform:translateY(30px);
  box-shadow:0 20px 60px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.04);
}
.game.visible{opacity:1;transform:translateY(0);}
.game::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(to right,transparent,rgba(255,215,0,0.7),transparent);
}
.game::after{
  content:'';position:absolute;top:-60px;right:-60px;
  width:160px;height:160px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,215,0,0.05) 0%,transparent 70%);
  pointer-events:none;
}
.game:hover{
  transform:translateY(-4px);
  box-shadow:0 30px 80px rgba(0,0,0,0.6),0 0 40px rgba(255,215,0,0.07),inset 0 1px 0 rgba(255,255,255,0.05);
}

.game-name{
  font-family:'Cinzel',serif;
  font-size:0.95rem;font-weight:600;
  color:rgba(255,245,230,0.85);
  letter-spacing:2px;text-transform:uppercase;
  margin-bottom:24px;padding-bottom:16px;
  border-bottom:1px solid rgba(255,215,0,0.1);
}

.levels{display:flex;gap:16px;}
.level{
  flex:1;
  background:rgba(255,215,0,0.04);
  border:1px solid rgba(255,215,0,0.1);
  border-radius:12px;padding:18px 14px;text-align:center;
  transition:background .3s;
}
.level:hover{background:rgba(255,215,0,0.07);}

.level-label{
  font-size:0.62rem;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,215,0,0.45);margin-bottom:10px;
}

.currency-badge{
  display:inline-block;font-size:0.58rem;
  font-weight:700;letter-spacing:2px;
  color:rgba(255,215,0,0.5);
  background:rgba(255,215,0,0.07);
  padding:3px 8px;border-radius:4px;margin-bottom:8px;
}

.amount{
  font-family:'Cinzel',serif;
  font-size:1.55rem;font-weight:900;
  color:var(--gold);margin-bottom:10px;line-height:1.1;
}

@keyframes goldPulse{
  0%{text-shadow:0 0 8px rgba(255,215,0,0.4);}
  50%{text-shadow:0 0 30px rgba(255,215,0,1),0 0 60px rgba(255,180,0,0.5),0 0 80px rgba(255,215,0,0.2);}
  100%{text-shadow:0 0 8px rgba(255,215,0,0.4);}
}
.amount.glow{animation:goldPulse 2.5s ease-in-out infinite;}

.date{font-size:0.65rem;color:rgba(255,245,230,0.3);letter-spacing:1px;}

/* ══════════════════════════════════════
   FOOTER
══════════════════════════════════════ */
footer{
  position:relative;z-index:2;
  padding:32px 6%;text-align:center;
  border-top:1px solid rgba(255,215,0,0.1);
  background:rgba(5,0,0,0.7);
}
footer p{
  font-size:0.68rem;color:rgba(255,215,0,0.35);
  letter-spacing:2px;font-weight:600;text-transform:uppercase;
}

/* ══════════════════════════════════════
   SCROLL REVEAL
══════════════════════════════════════ */
.reveal-section{
  opacity:0;transform:translateY(40px);
  transition:opacity .7s ease, transform .7s ease;
}
.reveal-section.visible{opacity:1;transform:none;}

/* ══════════════════════════════════════
   MOBILE
══════════════════════════════════════ */
@media(max-width:768px){
  .hero{padding:calc(var(--nav-h)+40px) 5% 60px;}
  .hero h1{font-size:2rem;}
  .event-body{padding:22px 20px 26px;}
  .levels{flex-direction:column;gap:12px;}
  #jackpot-container{grid-template-columns:1fr;}
  .toggle-buttons button{padding:9px 18px;font-size:0.75rem;}
  .section-title{font-size:1.4rem;}
  .amount{font-size:1.3rem;}
  .event-nav button{width:40px;height:40px;font-size:18px;}
}
@media(max-width:480px){
  .navbar{padding:0 4%;}
  .lang-switch button{width:33px;height:33px;font-size:13px;}
}
</style>
</head>

let currentEventIndex=0, currentLang="en", autoTimer=null;
const AUTO_MS=60000;
const dotsWrap=document.getElementById("evtDots");

function buildDots(){
  dotsWrap.innerHTML="";
  events.forEach((_,i)=>{
    const d=document.createElement("button");
    d.type="button";
    d.className="evt-dot"+(i===currentEventIndex?" active":"");
    d.setAttribute("aria-label","Event "+(i+1));
    d.addEventListener("click",()=>{currentEventIndex=i;applyEvent();restartAuto();});
    dotsWrap.appendChild(d);
  });
}
function updateDots(){dotsWrap.querySelectorAll(".evt-dot").forEach((d,i)=>d.classList.toggle("active",i===currentEventIndex));}

function startAuto(){stopAuto();autoTimer=setInterval(()=>{currentEventIndex=(currentEventIndex+1)%events.length;applyEvent();},AUTO_MS);}
function stopAuto(){if(autoTimer){clearInterval(autoTimer);autoTimer=null;}}
function restartAuto(){startAuto();}

function applyEvent(){
  const content=document.getElementById("heroContent");
  content.classList.add("fade");
  setTimeout(()=>{
    const evt=events[currentEventIndex]||events[0];
    const t=(evt.translations&&evt.translations[currentLang])?evt.translations[currentLang]:evt.translations.en;
    document.getElementById("event-title").innerHTML=t.title||"";
    document.getElementById("event-subtitle").innerHTML=t.subtitle||"";
    document.getElementById("event-pill").innerHTML=t.pill||"";
    const mw=document.getElementById("evtMediaWrap"), img=document.getElementById("evtImage");
    if(evt.image&&evt.image.trim()){img.src=evt.image;img.alt=t.title||"Event";mw.classList.add("has-img");}
    else{img.removeAttribute("src");mw.classList.remove("has-img");}
    setBlock("prize1",t.prize1);setBlock("prize2",t.prize2);setBlock("prize3",t.prize3);
    setBlock("schedule",t.schedule);setBlock("location",t.location);setBlock("cta-text",t.cta);
    updateDots();
    content.classList.remove("fade");
  },360);
}

function setBlock(id,html){
  const el=document.getElementById(id);if(!el)return;
  const empty=!html||String(html).trim()==="";
  el.innerHTML=html||"";el.style.display=empty?"none":"";
}

function setLanguage(lang,btn){
  currentLang=lang||"en";applyEvent();
  document.querySelectorAll(".lang-switch button").forEach(b=>b.classList.remove("active"));
  if(btn)btn.classList.add("active");
}

document.getElementById("evtPrev").addEventListener("click",()=>{currentEventIndex=(currentEventIndex-1+events.length)%events.length;applyEvent();restartAuto();});
document.getElementById("evtNext").addEventListener("click",()=>{currentEventIndex=(currentEventIndex+1)%events.length;applyEvent();restartAuto();});

const heroEl=document.getElementById("hero");
heroEl.addEventListener("mouseenter",stopAuto);
heroEl.addEventListener("mouseleave",startAuto);
heroEl.addEventListener("touchstart",stopAuto,{passive:true});
heroEl.addEventListener("touchend",startAuto,{passive:true});

buildDots();
setLanguage("en",document.querySelector(".lang-switch button"));
startAuto();

/* ══ JACKPOT ══ */
let jackpotData={},currentMode="current";

fetch("data.json").then(r=>r.json()).then(data=>{
  jackpotData=data;currentMode=data.mode||"current";
  setActiveBtn();renderJackpot();
}).catch(()=>{setActiveBtn();renderJackpot();});

document.getElementById("btn-current").onclick=()=>{currentMode="current";setActiveBtn();renderJackpot();};
document.getElementById("btn-last").onclick=()=>{currentMode="last";setActiveBtn();renderJackpot();};

function setActiveBtn(){
  document.getElementById("btn-current").classList.toggle("active",currentMode==="current");
  document.getElementById("btn-last").classList.toggle("active",currentMode==="last");
  const title=document.getElementById("jackpot-title");
  const sub=document.getElementById("jackpot-subtitle");
  if(currentMode==="current"){
    const d=new Date();
    const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    title.textContent="Current Jackpot";
    sub.textContent="As of "+String(d.getDate()).padStart(2,"0")+" "+months[d.getMonth()]+" "+d.getFullYear();
  }else{
    title.textContent="Last Jackpot Hits";
    sub.textContent="Previous winning amounts";
  }
}

function animateCounter(el,target){
  const dur=1600;let start=null;
  function step(ts){
    if(!start)start=ts;
    const pct=Math.min((ts-start)/dur,1);
    const ease=1-Math.pow(1-pct,3);
    el.textContent=Math.floor(ease*target).toLocaleString();
    if(pct<1)requestAnimationFrame(step);
    else el.textContent=target.toLocaleString();
  }
  requestAnimationFrame(step);
}

function renderJackpot(){
  const container=document.getElementById("jackpot-container");
  container.innerHTML="";
  const games=jackpotData[currentMode];
  if(!games)return;
  Object.entries(games).forEach(([key,game],idx)=>{
    const card=document.createElement("div");
    card.className="game";
    card.style.transitionDelay=(idx*0.12)+"s";
    card.innerHTML=`
      <div class="game-name">${formatGameName(key)}</div>
      <div class="levels">
        <div class="level">
          <div class="level-label">Level 1</div>
          <div class="currency-badge">THB</div>
          <div class="amount" data-value="${game.level1}">0</div>
          <div class="date">${currentMode==="current"?"Updated: "+(game.time||"--:--"):"Date: "+(game.level1_date||"--")}</div>
        </div>
        <div class="level">
          <div class="level-label">Level 2</div>
          <div class="currency-badge">THB</div>
          <div class="amount" data-value="${game.level2}">0</div>
          <div class="date">${currentMode==="current"?"Updated: "+(game.time||"--:--"):"Date: "+(game.level2_date||"--")}</div>
        </div>
      </div>`;
    container.appendChild(card);
  });

  requestAnimationFrame(()=>{
    document.querySelectorAll(".game").forEach(c=>c.classList.add("visible"));
    if(currentMode==="current"){
      document.querySelectorAll(".amount").forEach(el=>{
        const t=parseInt(el.dataset.value);
        if(!isNaN(t)){animateCounter(el,t);setTimeout(()=>el.classList.add("glow"),1600);}
      });
    }else{
      document.querySelectorAll(".amount").forEach(el=>{
        const v=parseInt(el.dataset.value);
        el.textContent=isNaN(v)?"-":Number(v).toLocaleString();
        el.classList.remove("glow");
      });
    }
  });
}

function formatGameName(key){return key.replace(/([A-Z])/g," $1").replace(/^./,s=>s.toUpperCase()).trim();}

/* ══ SCROLL REVEAL ══ */
const observer=new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add("visible");});
},{threshold:0.1});
document.querySelectorAll(".reveal-section").forEach(el=>observer.observe(el));
</script>
